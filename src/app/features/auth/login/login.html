<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 box-shadow rounded-3">
        <div class="card-body p-5">
          <h3 class="card-title text-center mb-4 text-dark fw-bold">Sign In</h3>
          <form>
            <div class="form-floating mb-3">
              <input type="email" class="form-control form-control-sm rounded-0" id="floatingInput" placeholder="name@example.com">
              <label for="floatingInput">Email address</label>
            </div>
            <div class="form-floating mb-4">
              <input type="password" class="form-control form-control-sm rounded-0" id="floatingPassword" placeholder="Password">
              <label for="floatingPassword">Password</label>
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <button class="btn btn-sm btn-warning me-md-2 fw-bold" type="button">Reset</button>
              <button class="btn btn-sm btn-material fw-bold" type="button">Login</button>
            </div>
            <div class="text-center mt-3">
              <a routerLink="/register" class="text-decoration-none">Don't have an account? Register</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
