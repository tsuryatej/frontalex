<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 box-shadow rounded-3">
        <div class="card-body p-5">
          <h3 class="card-title text-center mb-4 text-dark fw-bold">Create Account</h3>
          <form>
            <div class="row">
              <div class="col-md-6 form-floating mb-3">
                <input type="text" class="form-control form-control-sm rounded-0" id="firstName" placeholder="First Name">
                <label for="firstName" class="ms-2">First Name</label>
              </div>
              <div class="col-md-6 form-floating mb-3">
                <input type="text" class="form-control form-control-sm rounded-0" id="lastName" placeholder="Last Name">
                <label for="lastName" class="ms-2">Last Name</label>
              </div>
            </div>
            <div class="form-floating mb-3">
              <input type="email" class="form-control form-control-sm rounded-0" id="regEmail" placeholder="name@email.com">
              <label for="regEmail">Email address</label>
            </div>
            <div class="form-floating mb-4">
              <input type="password" class="form-control form-control-sm rounded-0" id="regPassword" placeholder="Password">
              <label for="regPassword">Password</label>
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <button class="btn btn-sm btn-warning btn-sm me-md-2 fw-bold" type="button">Reset</button>
              <button class="btn btn-material btn-sm shadow-sm fw-bold" type="button">Register</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
